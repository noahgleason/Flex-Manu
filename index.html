<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Custom Gear Manufacturer | Flex Manufacturing, Inc. — Metro Detroit</title>
<meta name="description" content="Custom gears, splines &amp; precision machining, 1&quot; to 240&quot; diameter, any quantity. Family-owned custom gear manufacturer in metro Detroit since 1974. Send your print, get a quote fast.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://fonts.googleapis.com">
<link rel="dns-prefetch" href="https://fonts.gstatic.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Flex Manufacturing, Inc.",
  "image": "https://flexmanufacturing.net/assets/og-image.png",
  "telephone": "+1-586-791-8060",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "44805 Trinity Dr",
    "addressLocality": "Clinton Township",
    "addressRegion": "MI",
    "postalCode": "48038",
    "addressCountry": "US"
  },
  "url": "https://flexmanufacturing.net/",
  "description": "Family-owned custom gear and precision machining company serving metro Detroit and beyond since 1974.",
  "foundingDate": "1974",
  "areaServed": "Metro Detroit"
}
</script>
</head>
<body>
<div id="root"></div>
<!-- Static duplicate of the Quote form so Netlify's build-time crawler can
     register it — the real form is rendered client-side by React, which
     Netlify's HTML parser never sees. Field names must match src/pages/Quote.jsx. -->
<form name="quote" action="/thank-you" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
  <input type="hidden" name="form-name" value="quote">
  <input type="text" name="name">
  <input type="text" name="company">
  <input type="email" name="email">
  <input type="tel" name="phone">
  <input type="text" name="quantity">
  <textarea name="description"></textarea>
  <input type="file" name="attachment">
  <input type="text" name="bot-field">
</form>
<!-- Static duplicate of the Partner RFQ form (src/pages/PartnerRFQ.jsx) for the
     same build-time reason as above. Not linked from nav/sitemap — direct-link only. -->
<form name="partner-rfq" action="/thank-you" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
  <input type="hidden" name="form-name" value="partner-rfq">
  <input type="text" name="name">
  <input type="text" name="company">
  <input type="email" name="email">
  <input type="tel" name="phone">
  <input type="text" name="quantity">
  <textarea name="description"></textarea>
  <input type="file" name="attachment">
  <input type="text" name="bot-field">
</form>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
